; agri-canopy-poe — M5Stack PoECAM (ESP32-WROVER + W5500 + OV2640) node
;
; Hardware
;   - M5Stack PoECAM-W (ESP32-WROVER-B, 8MB PSRAM, 16MB flash, W5500, OV2640)
;
; Publishes:
;   - CamShot (image URL, retained) after each successful WebDAV upload
;
; Notes
;   - Daylight gate is computed from lat/lon + NTP UTC via NOAA solar
;     position (see sun.h). The v0.1.x ADS1110/PVSS-03 analog path was
;     removed at v0.3.0 due to on-site ADC noise.
;   - LED (agri::Led) is disabled on this board — GPIO 27 is camera XCLK.
;     Status is logged over serial instead.
;   - Programming: M5 Writer via USB-C. upload_speed pinned at 115200.

[env:poecam-canopy]
platform = https://github.com/pioarduino/platform-espressif32.git#55.03.38
board = esp-wrover-kit
framework = arduino
monitor_speed = 115200
upload_speed = 115200
board_upload.flash_size = 16MB

build_flags =
	-DCORE_DEBUG_LEVEL=3
	-DBOARD_HAS_PSRAM
	-DARDUINO_USB_CDC_ON_BOOT=0

lib_deps =
	https://github.com/yasunorioi/agri-node-poe-core.git
